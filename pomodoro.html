<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            background: #f0f0f0;
            color: #666;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .stats {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        .stats-title {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .tomato-count {
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tomato {
            font-size: 24px;
        }

        .tomato.completed {
            filter: saturate(1);
        }

        .tomato.pending {
            filter: saturate(0.2);
            opacity: 0.5;
        }

        .progress-ring {
            margin: 20px auto;
        }

        .progress-ring circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .status {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .timer-running .timer-display {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 番茄钟</h1>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="pomodoro">专注</button>
            <button class="mode-btn" data-mode="shortBreak">短休息</button>
            <button class="mode-btn" data-mode="longBreak">长休息</button>
        </div>

        <div class="status" id="status">准备开始专注</div>

        <svg class="progress-ring" width="200" height="200">
            <circle stroke="#f0f0f0" stroke-width="8" fill="transparent" r="90" cx="100" cy="100"/>
            <circle id="progress" stroke="#667eea" stroke-width="8" fill="transparent" r="90" cx="100" cy="100"
                stroke-dasharray="565.48" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">开始</button>
            <button class="btn btn-secondary" id="resetBtn">重置</button>
        </div>

        <div class="stats">
            <div class="stats-title">今日完成的番茄数</div>
            <div class="tomato-count" id="tomatoCount"></div>
        </div>
    </div>

    <script>
        const MODES = {
            pomodoro: { time: 25 * 60, label: '专注时间' },
            shortBreak: { time: 5 * 60, label: '短休息' },
            longBreak: { time: 15 * 60, label: '长休息' }
        };

        let currentTime = MODES.pomodoro.time;
        let initialTime = currentTime;
        let timerId = null;
        let isRunning = false;
        let currentMode = 'pomodoro';
        let completedTomatoes = parseInt(localStorage.getItem('tomatoes') || '0');

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressCircle = document.getElementById('progress');
        const tomatoCountEl = document.getElementById('tomatoCount');
        const statusEl = document.getElementById('status');
        const container = document.querySelector('.container');

        const circumference = 2 * Math.PI * 90;
        progressCircle.style.strokeDasharray = circumference;

        function updateDisplay() {
            const minutes = Math.floor(currentTime / 60);
            const seconds = currentTime % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            const progress = currentTime / initialTime;
            progressCircle.style.strokeDashoffset = circumference * (1 - progress);

            document.title = `${timerDisplay.textContent} - 番茄钟`;
        }

        function renderTomatoes() {
            tomatoCountEl.innerHTML = '';
            for (let i = 0; i < Math.max(completedTomatoes, 8); i++) {
                const tomato = document.createElement('span');
                tomato.className = 'tomato ' + (i < completedTomatoes ? 'completed' : 'pending');
                tomato.textContent = '🍅';
                tomatoCountEl.appendChild(tomato);
            }
        }

        function playSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function switchMode(mode) {
            currentMode = mode;
            currentTime = MODES[mode].time;
            initialTime = currentTime;

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            statusEl.textContent = mode === 'pomodoro' ? '准备开始专注' : '休息时间';
            updateDisplay();
        }

        function startTimer() {
            if (isRunning) {
                pauseTimer();
                return;
            }

            isRunning = true;
            startBtn.textContent = '暂停';
            container.classList.add('timer-running');
            statusEl.textContent = MODES[currentMode].label + '中...';

            timerId = setInterval(() => {
                currentTime--;
                updateDisplay();

                if (currentTime <= 0) {
                    clearInterval(timerId);
                    timerComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            startBtn.textContent = '开始';
            container.classList.remove('timer-running');
            clearInterval(timerId);
        }

        function resetTimer() {
            pauseTimer();
            currentTime = MODES[currentMode].time;
            initialTime = currentTime;
            statusEl.textContent = currentMode === 'pomodoro' ? '准备开始专注' : '休息时间';
            updateDisplay();
        }

        function timerComplete() {
            isRunning = false;
            startBtn.textContent = '开始';
            container.classList.remove('timer-running');
            playSound();

            if (currentMode === 'pomodoro') {
                completedTomatoes++;
                localStorage.setItem('tomatoes', completedTomatoes.toString());
                renderTomatoes();
                statusEl.textContent = '专注完成！休息一下吧';

                if (completedTomatoes % 4 === 0) {
                    switchMode('longBreak');
                } else {
                    switchMode('shortBreak');
                }
            } else {
                statusEl.textContent = '休息结束，准备开始新的专注';
                switchMode('pomodoro');
            }
        }

        startBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isRunning) {
                    switchMode(btn.dataset.mode);
                }
            });
        });

        renderTomatoes();
        updateDisplay();
    </script>
</body>
</html>
